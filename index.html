<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
    rel="stylesheet">

</head>

<body>
  <nav class="navbar">
    <div class="navtop">
      <div class="logo">
        <img src="images/sneakers.png" alt="">
      </div>
      <div class="search">
        <input type="text" class="searchInput" placeholder="Search...">
        <img src="images/search.png" alt="searchIcon" style="width: 20; height: 20;">
      </div>
      <div class="offer">
        <span class="text">Limited Offer!</span>
      </div>
    </div>
    <div class="navbottom">
      <div class="menuitem">AIR FORCE</div>
      <div class="menuitem">JORDAN</div>
      <div class="menuitem">BLAZER</div>
      <div class="menuitem">CRATER</div>
      <div class="menuitem">HIPPIE</div>
    </div>
  </nav>
  <div class="slider">
    <div class="sliderWrapper">
      <div class="sliderItem">
        <img src="./images/air.png" alt="" class="sliderImg">
        <div class="sliderBg"></div>
        <h1 class="sliderTitle">AIR FORCE</br> NEW</br> SEASON</h1>
        <h2 class="sliderPrice">$119</h2>
        <a href="#product">
          <button class="buyButton">BUY NOW!</button>
        </a>
      </div>
      <div class="sliderItem">
        <img src="./images/jordan.png" alt="" class="sliderImg">
        <div class="sliderBg"></div>
        <h1 class="sliderTitle">AIR JORDAN</br> NEW</br> SEASON</h1>
        <h2 class="sliderPrice">$149</h2>
        <a href="#product">
          <button class="buyButton">BUY NOW!</button>
        </a>
      </div>
      <div class="sliderItem">
        <img src="./images/blazer.png" alt="" class="sliderImg">
        <div class="sliderBg"></div>
        <h1 class="sliderTitle">BLAZER</br> NEW</br> SEASON</h1>
        <h2 class="sliderPrice">$109</h2>
        <a href="#product">
          <button class="buyButton">BUY NOW!</button>
        </a>
      </div>
      <div class="sliderItem">
        <img src="./images/crater.png" alt="" class="sliderImg">
        <div class="sliderBg"></div>
        <h1 class="sliderTitle">CRATER</h1></br> NEW</br> SEASON</h1>
        <h2 class="sliderPrice">$189</h2>
        <a href="#product">
          <button class="buyButton">BUY NOW!</button>
        </a>
      </div>
      <div class="sliderItem">
        <img src="./images/hippie.png" alt="" class="sliderImg">
        <div class="sliderBg"></div>
        <h1 class="sliderTitle">HIPPIE</br> NEW</br> SEASON</h1>
        <h2 class="sliderPrice">$89</h2>
        <a href="#product">
          <button class="buyButton">BUY NOW!</button>
        </a>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
